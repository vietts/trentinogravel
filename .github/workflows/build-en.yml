name: Build EN page

on:
  push:
    branches: [main]
    paths:
      - index.html
      - content.json
      - build_en.py

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate en/index.html
        run: python3 build_en.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain en/index.html)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add en/index.html
            git commit -m "chore: rebuild en/index.html [skip ci]"
            git push
          else
            echo "No changes to en/index.html"
          fi
