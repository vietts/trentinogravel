<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Privacy Policy — Trentino Gravel</title>
  <meta name="description" content="Privacy policy di Trentino Gravel — Pioneer Edition.">
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="extracted/logo-real.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue:       #3B50C8;
      --blue-deep:  #2B3DA0;
      --orange:     #E85520;
      --orange-lt:  #F06030;
      --cream:      #F2EEAE;
      --offwhite:   #F5EDE0;
      --ink:        #0C0E1A;
      --white:      #FFFFFF;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--offwhite);
      color: var(--ink);
      line-height: 1.7;
    }

    /* Nav (simplified clone) */
    nav {
      position: sticky;
      top: 0;
      z-index: 900;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 3rem;
      height: 64px;
      background: var(--blue);
      border-bottom: 2px solid var(--blue-deep);
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      text-decoration: none;
    }
    .nav-mark { height: 42px; width: auto; }
    .nav-wordmark {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--cream);
      line-height: 1.15;
    }
    .nav-wordmark small {
      display: block;
      font-weight: 400;
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      color: rgba(242,238,174,0.55);
      margin-top: 1px;
    }
    .nav-back {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(242,238,174,0.75);
      text-decoration: none;
      transition: color .2s;
    }
    .nav-back:hover { color: var(--cream); }

    /* Header */
    .privacy-header {
      background: var(--blue);
      color: var(--cream);
      padding: 5rem 3rem 4rem;
      border-bottom: 1px solid rgba(242,238,174,0.15);
    }
    .privacy-header-inner {
      max-width: 780px;
      margin: 0 auto;
    }
    .privacy-kicker {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 1rem;
    }
    .privacy-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.6rem, 6vw, 4.8rem);
      line-height: 0.95;
      letter-spacing: 0.015em;
      color: var(--cream);
      font-weight: 400;
      margin-bottom: 1.2rem;
    }
    .privacy-meta {
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(242,238,174,0.55);
    }

    /* Content */
    main {
      max-width: 780px;
      margin: 0 auto;
      padding: 4rem 3rem 6rem;
    }
    .placeholder-note {
      background: var(--cream);
      border-left: 4px solid var(--orange);
      padding: 1.5rem 1.8rem;
      margin-bottom: 3rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--ink);
    }
    .placeholder-note strong {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 0.75rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--orange);
      display: block;
      margin-bottom: 0.5rem;
    }

    article h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.6rem, 2.6vw, 2.1rem);
      letter-spacing: 0.02em;
      color: var(--blue);
      margin: 2.8rem 0 1rem;
      font-weight: 400;
      line-height: 1.05;
    }
    article h2:first-of-type { margin-top: 0; }
    article h3 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 1.05rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--blue-deep);
      margin: 2rem 0 0.75rem;
    }
    article p {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.98rem;
      color: rgba(12,14,26,0.8);
      margin-bottom: 1.1rem;
    }
    article p strong { color: var(--ink); font-weight: 600; }
    article ul, article ol {
      margin: 0 0 1.4rem 1.4rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.98rem;
      color: rgba(12,14,26,0.8);
    }
    article li { margin-bottom: 0.5rem; line-height: 1.65; }
    article a {
      color: var(--orange);
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-thickness: 1px;
    }
    article a:hover { color: var(--orange-lt); }
    article hr {
      border: none;
      height: 1px;
      background: rgba(59,80,200,0.15);
      margin: 3rem 0;
    }

    /* Footer (simplified) */
    footer {
      background: var(--ink);
      padding: 2.5rem 3rem;
    }
    .footer-inner {
      max-width: 1160px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1.2rem;
    }
    .footer-wordmark {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--cream);
    }
    .footer-mono {
      font-family: 'DM Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(242,238,174,0.35);
    }
    .footer-links { display: flex; gap: 1.5rem; }
    .footer-links a {
      font-family: 'DM Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(242,238,174,0.3);
      text-decoration: none;
      transition: color .2s;
    }
    .footer-links a:hover { color: var(--orange); }

    @media (max-width: 640px) {
      nav { padding: 0 1.2rem; height: 56px; }
      .privacy-header { padding: 3.5rem 1.2rem 2.8rem; }
      main { padding: 2.8rem 1.2rem 4rem; }
      footer { padding: 2rem 1.2rem; }
      .footer-inner { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <!-- Nav -->
  <nav>
    <a href="index.html" class="nav-logo">
      <img src="extracted/logo-real-light.svg" class="nav-mark" alt="Trentino Gravel logo">
      <div class="nav-wordmark">
        Trentino Gravel
        <small>Dolomiti · Est. 2024</small>
      </div>
    </a>
    <a href="index.html" class="nav-back">← Torna al sito</a>
  </nav>

  <!-- Header -->
  <header class="privacy-header">
    <div class="privacy-header-inner">
      <div class="privacy-kicker" data-privacy-kicker>Informativa</div>
      <h1 class="privacy-title" data-privacy-title>Privacy Policy</h1>
      <div class="privacy-meta" data-privacy-updated>Ultimo aggiornamento: —</div>
    </div>
  </header>

  <!-- Content -->
  <main>
    <article id="privacy-body">
      <p><em data-privacy-pending>Informativa in fase di pubblicazione.</em></p>
    </article>
  </main>

  <script>
    (async function () {
      const LANG_KEY = 'tg-lang';
      let lang = 'it';
      try { lang = localStorage.getItem(LANG_KEY) || 'it'; } catch (e) {}
      const isEn = lang === 'en';

      document.documentElement.lang = lang;
      const titleEl = document.querySelector('[data-privacy-title]');
      const kickerEl = document.querySelector('[data-privacy-kicker]');
      const updatedEl = document.querySelector('[data-privacy-updated]');
      if (titleEl)  titleEl.textContent  = isEn ? 'Privacy Policy' : 'Privacy Policy';
      if (kickerEl) kickerEl.textContent = isEn ? 'Notice' : 'Informativa';

      try {
        const resp = await fetch('content.json', { cache: 'no-cache' });
        if (!resp.ok) return;
        const content = await resp.json();
        const priv = content.privacy || {};

        if (updatedEl) {
          const label = isEn ? 'Last updated' : 'Ultimo aggiornamento';
          updatedEl.textContent = `${label}: ${priv.lastUpdate || '—'}`;
        }

        const body = isEn ? (priv.bodyEn || priv.bodyIt || '') : (priv.bodyIt || priv.bodyEn || '');
        const article = document.getElementById('privacy-body');
        if (article && body.trim()) {
          article.innerHTML = body;
        } else if (article) {
          article.innerHTML = `<p><em>${isEn ? 'Privacy policy is being finalised.' : 'Informativa in fase di pubblicazione.'}</em></p>`;
        }

        document.title = isEn ? 'Privacy Policy — Trentino Gravel' : 'Privacy Policy — Trentino Gravel';
      } catch (e) { /* offline: keep fallback */ }
    })();
  </script>

  <!-- Footer -->
  <footer>
    <div class="footer-inner">
      <div class="footer-wordmark">Trentino Gravel</div>
      <div class="footer-mono">© 2026 Trentino Gravel</div>
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="index.html#faq">FAQ</a>
        <a href="index.html#waitlist">Iscriviti</a>
      </div>
    </div>
  </footer>

</body>
</html>
