# Pages CMS configuration — https://pagescms.org
#
# How to connect:
#   1. Go to https://app.pagescms.org, log in with GitHub
#   2. Select vietts/trentinogravel → admin is auto-generated from this file
#   3. Editors see structured forms, save triggers a commit → Cloudflare rebuilds
#
# Docs: https://pagescms.org/docs/configuration/

media:
  input: photos
  output: photos/

